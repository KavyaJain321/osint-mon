# ============================================================
# ROBIN OSINT — Render Free-Tier Deployment
#
# Single Docker web service — runs API + scheduler + video pipeline
# in one process. State (video queue) lives in Supabase, not RAM,
# so Render free-tier spin-down / restarts are safe.
#
# cron.org pings /health every 10 min to prevent spin-down.
# ============================================================

services:
  - type: web
    name: robin-backend
    runtime: docker
    plan: free
    dockerfilePath: robin-backend/Dockerfile
    dockerContext: robin-backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # All secrets (SUPABASE_URL, GROQ keys, CLOUDINARY, etc.)
      # are already set in your Render dashboard env vars — no change needed.
